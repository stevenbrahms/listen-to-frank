name: Refresh entry drawing manifest

# When entry-screen drawings change, rebuild entry/manifest.json (the list the
# site reads) and commit it back — so dropping a drawing into GitHub with any
# filename makes it appear on the live entry screen automatically.

on:
  push:
    branches: [ main ]
    paths:
      - 'entry/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild entry/manifest.json
        run: python3 build-entry-manifest.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain entry/manifest.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add entry/manifest.json
            git commit -m "Auto-update entry/manifest.json"
            git push
          else
            echo "Manifest already up to date."
          fi
