name: Refresh drawing manifests

# When entry-screen or gallery drawings change, rebuild the manifests the site
# reads (entry/manifest.json + drawings/manifest.json) and commit them back —
# so dropping a drawing into GitHub makes it appear on the live site
# automatically, with no manual steps.

on:
  push:
    branches: [ main ]
    paths:
      - 'entry/**'
      - 'drawings/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild entry manifest
        run: python3 build-entry-manifest.py
      - name: Rebuild gallery drawings manifest
        run: python3 build-drawings-manifest.py
      - name: Commit if changed
        run: |
          git add entry/manifest.json drawings/manifest.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Manifests already up to date."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Auto-update drawing manifests"
            git push
          fi
